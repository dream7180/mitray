name: Build MiTray

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write  # 允许创建 releases 和上传 artifacts

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Compile with Ahk2Exe
      uses: CCCC-L/Action-Ahk2Exe@main
      with:
        in: mitray.ahk
        out: mitray.exe

    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: mitray-${{ github.sha }}
        path: mitray.exe
        retention-days: 30

    - name: Create Release
      if: startsWith(github.ref, 'refs/tags/')
      uses: softprops/action-gh-release@v1
      with:
        files: mitray.exe
        draft: false
        prerelease: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
