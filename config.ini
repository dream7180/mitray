[Mihomo]
; ============================================================================
; Mihomo 核心配置
; ============================================================================

; mihomo 可执行文件的完整路径（必填）
; 示例 Windows 路径：
CorePath=D:\Program\Mihomo\mihomo-windows-amd64.exe
; 或相对路径：
; CorePath=.\mihomo\mihomo.exe

; 本地配置文件路径（ConfigPath 和 ConfigURL 二选一）
; 如果同时配置，ConfigURL 优先级更高
ConfigPath=D:\Program\Mihomo\config.yaml
; 或相对路径：
; ConfigPath=.\config.yaml

; 远程配置文件 URL（可选，订阅链接）
; 如果配置了 URL，会自动下载并使用，优先级高于 ConfigPath
; ConfigURL=https://example.com/clash/config.yaml

[API]
; ============================================================================
; API 配置（可选，会自动从 mihomo 配置文件读取）
; ============================================================================

; API 密钥（如果 mihomo config.yaml 中配置了 secret）
; 程序会优先从 mihomo 配置文件中读取，这里可以覆盖
; 示例：
; Secret=your_secret_key_here
Secret=


[Settings]
; ============================================================================
; 程序设置
; ============================================================================

; 程序启动时自动启动 mihomo 核心
; 1 = 是（推荐），0 = 否
AutoStartCore=1

; - TUN 模式：由 mihomo 配置文件中的 tun.enable 控制，重启后自动恢复
; - 系统代理：由 Windows 注册表控制，重启后自动保持上次状态


; ============================================================================
; 配置说明和常见场景
; ============================================================================

; 场景 1：使用本地配置文件
; ---------------------------
; [Mihomo]
; CorePath=C:\mihomo\mihomo.exe
; ConfigPath=C:\mihomo\config.yaml
; ConfigURL=
;
; [Settings]
; AutoStartCore=1

; 场景 2：使用订阅链接
; ---------------------------
; [Mihomo]
; CorePath=C:\mihomo\mihomo.exe
; ConfigPath=
; ConfigURL=https://example.com/subscription/clash.yaml
;
; [Settings]
; AutoStartCore=1

; 场景 3：本地配置 + 订阅备份（优先使用订阅）
; ---------------------------
; [Mihomo]
; CorePath=C:\mihomo\mihomo.exe
; ConfigPath=C:\mihomo\config.yaml
; ConfigURL=https://example.com/subscription/clash.yaml
;
; [Settings]
; AutoStartCore=1
; 
; 说明：如果订阅下载失败，会回退使用本地配置文件

; 场景 4：手动启动 mihomo，程序只做管理
; ---------------------------
; [Mihomo]
; CorePath=C:\mihomo\mihomo.exe
; ConfigPath=C:\mihomo\config.yaml
; ConfigURL=
;
; [Settings]
; AutoStartCore=0
;
; 说明：程序不会自动启动 mihomo，但会检测已运行的 mihomo 进程


; ============================================================================
; 重要提示
; ============================================================================

; 1. 路径中的反斜杠 \ 不需要转义，直接使用即可
;    正确：C:\Program Files\mihomo\mihomo.exe
;    错误：C:\\Program Files\\mihomo\\mihomo.exe

; 2. mihomo 配置文件 (config.yaml) 中需要配置：
;    - external-controller: 127.0.0.1:9090  # API 地址
;    - secret: your_secret                  # API 密钥（可选但推荐）
;    - external-ui: ui                      # WebUI 文件夹路径
;    - external-ui-name: xd                 # WebUI 文件夹名称（可选）
;    - mixed-port: 7892                     # 代理端口
;    - tun:
;        enable: false                      # TUN 模式默认状态

; 3. 所有 API、端口等配置会自动从 mihomo 配置文件读取
;    本配置文件只需要配置核心路径和配置文件位置

; 4. 程序图标：可在脚本目录放置 mihomo.ico 文件作为托盘图标

; 5. 开机自启：通过托盘菜单的"开机自启"选项控制，会写入注册表

; 6. 如需手动编辑此文件，保存后重启程序生效