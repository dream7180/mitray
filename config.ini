[Mihomo]
; ============================================================================
; Mihomo 核心配置
; ============================================================================

; mihomo 可执行文件的完整路径(必填)
; 示例 Windows 路径:
CorePath=D:\Program\Mihomo\mihomo-windows-amd64.exe
; 或相对路径:
; CorePath=.\mihomo\mihomo.exe

; 本地配置文件路径(ConfigPath 和 ConfigURL 二选一)
; 如果同时配置,ConfigURL 优先级更高
ConfigPath=D:\Program\Mihomo\config.yaml
; 或相对路径:
; ConfigPath=.\config.yaml

; 远程配置文件 URL(可选,订阅链接)
; 如果配置了 URL,会自动下载并使用,优先级高于 ConfigPath
; ConfigURL=https://example.com/clash/config.yaml


[Settings]
; ============================================================================
; 程序设置
; ============================================================================

; 程序启动时自动启动 mihomo 核心
; 1 = 是(推荐),0 = 否
AutoStartCore=1

; 注意:
; - RESTful API 相关参数(地址、端口、密钥等)会自动从 mihomo 配置文件中读取
; - TUN 模式:由 mihomo 配置文件中的 tun.enable 控制,重启后自动恢复
; - 系统代理:由 Windows 注册表控制,重启后自动保持上次状态

